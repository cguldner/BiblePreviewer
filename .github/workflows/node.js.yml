name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions: read-all

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test

  build:
    name: Build code base
    runs-on: ubuntu-latest
    needs: unit-tests

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Set up Chrome for Testing
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
        id: setup-chrome
      - name: Run Cypress tests
        uses: cypress-io/github-action@v7
        with:
          install-command: npm ci
          build: npm run build:dev -- --env BIBLE_API_KEY=${{ secrets.BIBLE_API_KEY }}
          browser: chrome-for-testing
          headed: true
        env:
          # Point Cypress explicitly to the CfT binary location
          CYPRESS_CHROME_BINARY: ${{ steps.setup-chrome.outputs.chrome-path }}

  zip:
    name: Create releasable zips
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: npm install
        uses: bahmutov/npm-install@v1
      - run: npm run build:dev -- --env BIBLE_API_KEY=${{ secrets.BIBLE_API_KEY }}
      - run: npm run zip
      - name: Upload zip files
        uses: actions/upload-artifact@v4
        with:
          name: Built Zips
          path: "*.zip"
