name: Build and Test

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22.x"

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm test

  build:
    name: Build and run Cypress tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Set up Chrome for Testing
        uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          chrome-version: stable
      - name: Build development bundle
        run: npm run build:dev -- --env BIBLE_API_KEY=${{ secrets.BIBLE_API_KEY }}
      - name: Run Cypress tests
        uses: cypress-io/github-action@v7
        with:
          install: false
          browser: chrome-for-testing
          headed: true
        env:
          CYPRESS_CHROME_BINARY: ${{ steps.setup-chrome.outputs.chrome-path }}

  zip:
    name: Create releasable zips
    runs-on: ubuntu-latest
    needs: [unit-tests, build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build development bundle
        run: npm run build:dev -- --env BIBLE_API_KEY=${{ secrets.BIBLE_API_KEY }}
      - name: Create zip files
        run: npm run zip
      - name: Upload zip files
        uses: actions/upload-artifact@v4
        with:
          name: Built Zips
          path: "*.zip"
