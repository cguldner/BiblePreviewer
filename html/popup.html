<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Options</title>
    <link rel="stylesheet" href="../css/popup.css" />
  </head>
  <body>
    <div class="popup">
      <h1 class="title">Bible Previewer</h1>

      <div class="field">
        <label for="language">Language</label>
        <select id="language">
          <option value="eng">English (US)</option>
        </select>
      </div>
      <div class="field">
        <label for="bible-version">Bible Version</label>
        <select disabled id="bible-version">
          <option disabled selected value>--- Select a version ---</option>
        </select>
      </div>
      <div id="save-status"></div>
      <button
        class="button"
        id="reload-button"
        title="Re-run verse link detection on this page"
        type="button"
      >
        Re-Scan This Page
      </button>
      <button
        class="button"
        id="blacklist-button"
        title="Toggle this website in the blacklist"
        type="button"
      >
        Blacklist This Website
      </button>
    </div>

    <script src="../js/popup.js"></script>
  </body>
</html>
